<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配送トラッカー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefed;
    --text: #1a1a1a; --text2: #6b6b68; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue: #185FA5; --blue-light: #E6F1FB; --blue-mid: #378ADD; --blue-dark: #0C447C;
    --teal-light: #E1F5EE; --teal-dark: #085041;
    --amber-light: #FAEEDA; --amber-dark: #633806;
    --purple-light: #EEEDFE; --purple-dark: #3C3489;
    --green-light: #E8F7EE; --green-dark: #1A6B3C;
    --red: #E24B4A; --danger: #A32D2D; --danger-border: rgba(163,45,45,0.4);
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #f0f0ed; --text2: #a0a09c; --text3: #6b6b68;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue-light: #0c2d4a; --blue-dark: #85b7eb;
      --teal-light: #062820; --teal-dark: #5dcaa5;
      --amber-light: #2e1f04; --amber-dark: #fac775;
      --purple-light: #1e1b3a; --purple-dark: #afa9ec;
      --green-light: #0d2e1c; --green-dark: #5dcaa5;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
  .hidden { display: none !important; }
  h3 { font-size: 16px; font-weight: 500; margin: 0 0 1rem; }
  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 4px; }
  input[type=text], input[type=number], input[type=date], textarea, select {
    width: 100%; padding: 8px 12px; font-size: 14px; border: 0.5px solid var(--border2);
    border-radius: var(--radius); background: var(--bg); color: var(--text);
    font-family: inherit; outline: none; transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--blue-mid); box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  textarea { min-height: 56px; resize: vertical; }
  .btn-primary { width: 100%; padding: 10px; background: var(--blue); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { background: var(--blue-dark); }
  .btn-sm { padding: 6px 14px; font-size: 13px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .btn-sm:hover { background: var(--bg2); }
  .btn-danger { padding: 6px 14px; font-size: 13px; border: 0.5px solid var(--danger-border); background: transparent; color: var(--danger); border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .err { font-size: 13px; color: var(--red); margin: 6px 0 0; min-height: 18px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: .75rem 1rem; }
  .metric-label { font-size: 12px; color: var(--text2); margin: 0 0 4px; }
  .metric-value { font-size: 22px; font-weight: 500; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
  .tag.n { background: var(--blue-light); color: var(--blue-dark); }
  .tag.c { background: var(--teal-light); color: var(--teal-dark); }
  .tag.col { background: var(--amber-light); color: var(--amber-dark); }
  .tag.custom { background: var(--purple-light); color: var(--purple-dark); }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--blue-light); display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 14px; color: var(--blue-dark); flex-shrink: 0; }
  .pin-display { display: flex; gap: 12px; justify-content: center; margin: 1rem 0; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--blue-mid); background: transparent; transition: background .15s; }
  .pin-dot.filled { background: var(--blue-mid); }
  .numpad { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; max-width: 240px; margin: 0 auto; }
  .numpad button { padding: 14px 0; font-size: 20px; font-weight: 500; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); border-radius: var(--radius); cursor: pointer; font-family: inherit; }
  .numpad button:hover { background: var(--bg2); }
  .numpad button:active { transform: scale(.96); }
  .npc { font-size: 14px !important; color: var(--text2) !important; }
  .tab-bar { display: flex; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 1.25rem; }
  .tab-btn { flex: 1; padding: 9px 0; font-size: 13px; font-weight: 500; border: none; background: transparent; color: var(--text2); cursor: pointer; font-family: inherit; border-right: 0.5px solid var(--border); }
  .tab-btn:last-child { border-right: none; }
  .tab-btn.active { background: var(--blue); color: #fff; }
  .item-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
  .cnt-wrap { display: flex; align-items: center; gap: 6px; }
  .cnt-btn { width: 32px; height: 32px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); flex-shrink: 0; }
  .cnt-input { width: 64px; text-align: center; font-size: 20px; font-weight: 500; padding: 4px 0; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-dow { font-size: 12px; color: var(--text2); text-align: center; padding: 4px 0; font-weight: 500; }
  .cal-day { border-radius: var(--radius); padding: 4px 3px; min-height: 58px; border: 0.5px solid var(--border); background: var(--bg); cursor: pointer; }
  .cal-day:hover { background: var(--bg2); }
  .cal-day.today { border-color: var(--blue-mid); border-width: 1.5px; }
  .cal-day.has-data { background: var(--blue-light); }
  .cal-day.has-data:hover { background: #B5D4F4; }
  .cal-day.other-month { opacity: .35; }
  .cal-day.closing-day { border-color: var(--red) !important; border-width: 1.5px !important; }
  .cal-num { font-size: 12px; font-weight: 500; text-align: center; margin-bottom: 2px; }
  .cal-yen { font-size: 10px; color: var(--blue-dark); text-align: center; line-height: 1.3; }
  .cal-cnt { font-size: 10px; color: var(--teal-dark); text-align: center; }
  .record-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; flex-wrap: wrap; }
  .period-header { background: var(--green-light); border: 0.5px solid rgba(26,107,60,0.2); border-radius: var(--radius); padding: 10px 14px; margin: 12px 0 4px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .period-header .ph-title { font-size: 13px; font-weight: 500; color: var(--green-dark); }
  .period-header .ph-summary { font-size: 13px; color: var(--green-dark); }
  .period-header .ph-total { font-size: 16px; font-weight: 600; color: var(--green-dark); }
  .summary-banner { background: var(--green-light); border: 0.5px solid rgba(26,107,60,0.25); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999; pointer-events: none; }
  .toast { background: var(--blue); color: #fff; padding: 10px 24px; border-radius: var(--radius); font-size: 14px; opacity: 0; transition: opacity .3s; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .loading-box { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem 2rem; font-size: 15px; }
  .items-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .summary-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 1.25rem; }
  @media (max-width: 480px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>
<div class="wrap" id="app">

  <!-- ログイン -->
  <div id="screen-login">
    <div style="max-width:340px;margin:0 auto;">
      <p style="font-size:24px;font-weight:500;margin:0 0 1.5rem;">配送トラッカー</p>
      <div class="card">
        <h3>ログイン</h3>
        <div style="margin-bottom:16px;"><label>ユーザー名</label><input type="text" id="login-name" placeholder="名前を入力" /></div>
        <label style="text-align:center;display:block;margin-bottom:4px;">4桁のPIN</label>
        <div class="pin-display"><div class="pin-dot" id="login-d0"></div><div class="pin-dot" id="login-d1"></div><div class="pin-dot" id="login-d2"></div><div class="pin-dot" id="login-d3"></div></div>
        <div class="numpad">
          <button onclick="pi('login','1')">1</button><button onclick="pi('login','2')">2</button><button onclick="pi('login','3')">3</button>
          <button onclick="pi('login','4')">4</button><button onclick="pi('login','5')">5</button><button onclick="pi('login','6')">6</button>
          <button onclick="pi('login','7')">7</button><button onclick="pi('login','8')">8</button><button onclick="pi('login','9')">9</button>
          <button onclick="pi('login','del')" class="npc">削除</button><button onclick="pi('login','0')">0</button><button onclick="pi('login','clear')" class="npc">クリア</button>
        </div>
        <p class="err" id="login-err" style="text-align:center;"></p>
        <hr class="divider">
        <p style="font-size:13px;color:var(--text2);margin:0 0 10px;">アカウントをお持ちでない方</p>
        <button class="btn-sm" style="width:100%;" onclick="ss('register')">新規登録</button>
      </div>
    </div>
  </div>

  <!-- 新規登録 -->
  <div id="screen-register" class="hidden">
    <div style="max-width:340px;margin:0 auto;">
      <p style="font-size:24px;font-weight:500;margin:0 0 1.5rem;">新規登録</p>
      <div class="card">
        <div style="margin-bottom:16px;"><label>ユーザー名</label><input type="text" id="reg-name" placeholder="例：田中 太郎" /></div>
        <label style="text-align:center;display:block;margin-bottom:4px;">4桁のPINを設定</label>
        <div class="pin-display"><div class="pin-dot" id="reg-d0"></div><div class="pin-dot" id="reg-d1"></div><div class="pin-dot" id="reg-d2"></div><div class="pin-dot" id="reg-d3"></div></div>
        <div class="numpad">
          <button onclick="pi('reg','1')">1</button><button onclick="pi('reg','2')">2</button><button onclick="pi('reg','3')">3</button>
          <button onclick="pi('reg','4')">4</button><button onclick="pi('reg','5')">5</button><button onclick="pi('reg','6')">6</button>
          <button onclick="pi('reg','7')">7</button><button onclick="pi('reg','8')">8</button><button onclick="pi('reg','9')">9</button>
          <button onclick="pi('reg','del')" class="npc">削除</button><button onclick="pi('reg','0')">0</button><button onclick="pi('reg','clear')" class="npc">クリア</button>
        </div>
        <p class="err" id="reg-err" style="text-align:center;"></p>
        <hr class="divider">
        <button class="btn-sm" style="width:100%;" onclick="ss('login')">ログインに戻る</button>
      </div>
    </div>
  </div>

  <!-- メイン -->
  <div id="screen-main" class="hidden">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;flex-wrap:wrap;">
      <div class="avatar" id="main-avatar">--</div>
      <div style="flex:1;"><p style="font-size:15px;font-weight:500;margin:0;" id="main-uname">--</p><p style="font-size:12px;color:var(--text2);margin:0;" id="main-closing-label">締め日：末日</p></div>
      <button class="btn-sm" onclick="ss('settings')">設定</button>
      <button class="btn-sm" onclick="doLogout()">ログアウト</button>
    </div>

    <!-- 当締め期間バナー -->
    <div class="summary-banner" id="period-banner"></div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tab-input" onclick="switchTab('input')">記録入力</button>
      <button class="tab-btn" id="tab-calendar" onclick="switchTab('calendar')">カレンダー</button>
      <button class="tab-btn" id="tab-list" onclick="switchTab('list')">一覧</button>
    </div>

    <!-- 入力 -->
    <div id="pane-input">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;">
        <label style="margin:0;white-space:nowrap;font-size:13px;color:var(--text2);">記録日</label>
        <input type="date" id="record-date" style="flex:1;" />
      </div>
      <div class="items-grid" id="items-grid"></div>
      <div class="summary-grid">
        <div class="metric"><p class="metric-label">合計個数</p><p class="metric-value" id="total-count">0 個</p></div>
        <div class="metric"><p class="metric-label">種別数</p><p class="metric-value" id="type-count">0 種</p></div>
        <div class="metric"><p class="metric-label">本日の日額</p><p class="metric-value" style="color:var(--blue);" id="total-yen">0 円</p></div>
      </div>
      <div style="margin-bottom:1.25rem;"><label>メモ（任意）</label><textarea id="memo" placeholder="特記事項など..."></textarea></div>
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" onclick="saveRecord()">この日の記録を保存</button>
        <button class="btn-sm" onclick="clearForm()">クリア</button>
      </div>
    </div>

    <!-- カレンダー -->
    <div id="pane-calendar" class="hidden">
      <div class="cal-header">
        <button class="btn-sm" onclick="calMove(-1)">◀</button>
        <span id="cal-title" style="font-size:15px;font-weight:500;"></span>
        <button class="btn-sm" onclick="calMove(1)">▶</button>
      </div>
      <div class="cal-grid" style="margin-bottom:3px;">
        <div class="cal-dow" style="color:var(--red);">日</div>
        <div class="cal-dow">月</div><div class="cal-dow">火</div><div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div>
        <div class="cal-dow" style="color:var(--blue);">土</div>
      </div>

      <p style="font-size:11px;color:var(--text3);margin:6px 0 0;text-align:right;">🔴 枠 = 締め日</p>
      <div id="cal-detail" style="margin-top:1rem;"></div>
    </div>

    <!-- 一覧 -->
    <div id="pane-list" class="hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <span style="font-size:15px;font-weight:500;">締め期間別・記録一覧</span>
        <button class="btn-sm" onclick="exportCSV()">CSVで出力</button>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- 設定 -->
  <div id="screen-settings" class="hidden">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;">
      <button class="btn-sm" onclick="ss('main')">← 戻る</button>
      <span style="font-size:16px;font-weight:500;">設定</span>
    </div>

    <!-- 締め日設定 -->
    <div class="card">
      <h3>締め日の設定</h3>
      <p style="font-size:13px;color:var(--text2);margin:0 0 12px;">毎月の締め日を設定します。翌月の同日の前日までが1締め期間になります。</p>
      <label>締め日</label>
      <select id="closing-day-select" style="margin-bottom:12px;">
        <option value="0">月末（末日）</option>
      </select>
      <button class="btn-sm" onclick="saveClosingDay()" style="width:100%;">保存する</button>
      <p class="err" id="closing-err"></p>
    </div>

    <!-- 種別管理 -->
    <div class="card">
      <h3>荷物種別の管理</h3>
      <div id="categories-list" style="margin-bottom:12px;"></div>
      <hr class="divider" style="margin:12px 0;">
      <p style="font-size:13px;font-weight:500;color:var(--text2);margin:0 0 10px;">新しい種別を追加</p>
      <div style="display:grid;grid-template-columns:1fr 110px;gap:8px;margin-bottom:8px;">

        <div><label>単価（円）</label><input type="number" id="new-cat-price" placeholder="300" min="0" /></div>
      </div>
      <button class="btn-sm" onclick="addCategory()" style="width:100%;">追加する</button>
      <p class="err" id="cat-err"></p>
    </div>

    <!-- PIN変更 -->
    <div class="card">
      <h3>PIN変更</h3>
      <label style="text-align:center;display:block;margin-bottom:4px;">現在のPIN</label>
      <div class="pin-display"><div class="pin-dot" id="cur-d0"></div><div class="pin-dot" id="cur-d1"></div><div class="pin-dot" id="cur-d2"></div><div class="pin-dot" id="cur-d3"></div></div>
      <div class="numpad" style="margin-bottom:16px;">
        <button onclick="pi('cur','1')">1</button><button onclick="pi('cur','2')">2</button><button onclick="pi('cur','3')">3</button>
        <button onclick="pi('cur','4')">4</button><button onclick="pi('cur','5')">5</button><button onclick="pi('cur','6')">6</button>
        <button onclick="pi('cur','7')">7</button><button onclick="pi('cur','8')">8</button><button onclick="pi('cur','9')">9</button>
        <button onclick="pi('cur','del')" class="npc">削除</button><button onclick="pi('cur','0')">0</button><button onclick="pi('cur','clear')" class="npc">クリア</button>
      </div>
      <label style="text-align:center;display:block;margin-bottom:4px;">新しいPIN</label>
      <div class="pin-display"><div class="pin-dot" id="new-d0"></div><div class="pin-dot" id="new-d1"></div><div class="pin-dot" id="new-d2"></div><div class="pin-dot" id="new-d3"></div></div>
      <div class="numpad">
        <button onclick="pi('new','1')">1</button><button onclick="pi('new','2')">2</button><button onclick="pi('new','3')">3</button>
        <button onclick="pi('new','4')">4</button><button onclick="pi('new','5')">5</button><button onclick="pi('new','6')">6</button>
        <button onclick="pi('new','7')">7</button><button onclick="pi('new','8')">8</button><button onclick="pi('new','9')">9</button>
        <button onclick="pi('new','del')" class="npc">削除</button><button onclick="pi('new','0')">0</button><button onclick="pi('new','clear')" class="npc">クリア</button>
      </div>
      <p class="err" id="pw-err" style="text-align:center;"></p>
    </div>

    <div class="card">
      <h3>アカウント削除</h3>
      <p style="font-size:13px;color:var(--text2);margin:0 0 12px;">すべての記録と設定が削除されます。この操作は取り消せません。</p>
      <button class="btn-danger" onclick="deleteAccount()">アカウントを削除する</button>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const SUPABASE_URL = 'https://pygoifocbqcrhwanhldv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB5Z29pZm9jYnFjcmh3YW5obGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwOTUxODQsImV4cCI6MjA5NDY3MTE4NH0.U3xJIkbcBp_ifGNq1ehucjsKUQ-0DjfplHaU1K-HeBM';

const DEFAULTS = [{id:'normal',name:'通常',price:155,fixed:true},{id:'cool',name:'クール',price:235,fixed:true},{id:'collect',name:'コレクト',price:232,fixed:true}];
const CAT_COLORS = {normal:'#378ADD',cool:'#1D9E75',collect:'#BA7517'};
let CU=null, cats=[], records=[], closingDay=0; // 0=末日
const pins={};
let calYear, calMonth;

/* ══ Supabase ══ */
async function sb(path, method='GET', body=null) {
  const h={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
  if(method==='POST')h['Prefer']='return=representation';
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!res.ok){const e=await res.json();throw new Error(e.message||res.status);}
  const t=await res.text();return t?JSON.parse(t):[];
}
const enc=s=>encodeURIComponent(s);
async function dbGetUser(u){const r=await sb(`users?username=eq.${enc(u)}&select=*`);return r[0]||null;}
async function dbCreateUser(u,h){return sb('users','POST',{username:u,pin_hash:h});}
async function dbUpdatePin(u,h){return sb(`users?username=eq.${enc(u)}`,'PATCH',{pin_hash:h});}
async function dbDeleteUser(u){return sb(`users?username=eq.${enc(u)}`,'DELETE');}
async function dbGetRecords(u){return sb(`delivery_records?username=eq.${enc(u)}&order=date.desc&select=*`);}

/* 締め日はusersテーブルのclosing_dayカラムに保存（なければlocalStorageで代替） */
async function dbSaveClosingDay(u,day){
  try{ await sb(`users?username=eq.${enc(u)}`,'PATCH',{closing_day:day}); }
  catch(e){ localStorage.setItem('closing_'+u, day); }
  localStorage.setItem('closing_'+u, day);
}
async function dbGetClosingDay(u){
  try{
    const r=await sb(`users?username=eq.${enc(u)}&select=closing_day`);
    if(r[0]&&r[0].closing_day!=null)return r[0].closing_day;
  }catch(e){}
  const v=localStorage.getItem('closing_'+u);
  return v!=null?parseInt(v):0;
}

/* ══ PIN ══ */
function pi(ctx,v){
  if(!pins[ctx])pins[ctx]='';
  if(v==='clear')pins[ctx]='';
  else if(v==='del')pins[ctx]=pins[ctx].slice(0,-1);
  else if(pins[ctx].length<4)pins[ctx]+=v;
  updDots(ctx);
  if(ctx==='login'&&pins[ctx].length===4)setTimeout(doLogin,120);
  if(ctx==='reg'&&pins[ctx].length===4)setTimeout(doRegister,120);
  if(ctx==='new'&&pins[ctx].length===4&&(pins.cur||'').length===4)setTimeout(changePin,120);
}
function updDots(ctx){const l=(pins[ctx]||'').length;for(let i=0;i<4;i++){const el=document.getElementById(ctx+'-d'+i);if(el)el.classList.toggle('filled',i<l);}}
function hashPin(p){let h=0;for(let i=0;i<p.length;i++){h=((h<<5)-h)+p.charCodeAt(i);h|=0;}return h.toString(36);}

/* ══ 締め期間計算 ══ */
// closingDay: 0=末日, 1〜31=その日
// 締め期間: 前月締め日+1 〜 当月締め日
function getClosingDate(year, month, day) {
  // dayが0=末日
  if(day===0) return new Date(year, month+1, 0); // 月末
  const lastDay = new Date(year, month+1, 0).getDate();
  return new Date(year, month, Math.min(day, lastDay));
}

function getPeriodForDate(dateStr) {
  // dateStrの属する締め期間の start〜end を返す
  const d = new Date(dateStr);
  const year = d.getFullYear(), month = d.getMonth(), date = d.getDate();
  const cd = closingDay;

  let periodEnd, periodStart;
  if(cd===0){
    // 末日締め: 1日〜末日
    periodStart = new Date(year, month, 1);
    periodEnd   = new Date(year, month+1, 0);
  } else {
    // cd日締め: 前月cd+1日 〜 今月cd日
    // dateがcd日以前なら「前月cd+1 〜 今月cd」
    // dateがcd日より後なら「今月cd+1 〜 来月cd」
    if(date <= cd){
      const prevLastDay = new Date(year, month, 0).getDate();
      periodStart = new Date(year, month-1, Math.min(cd+1, prevLastDay));
      periodEnd   = new Date(year, month, Math.min(cd, new Date(year,month+1,0).getDate()));
    } else {
      const thisLastDay = new Date(year, month+1, 0).getDate();
      periodStart = new Date(year, month, cd+1);
      periodEnd   = new Date(year, month+1, Math.min(cd, new Date(year,month+2,0).getDate()));
    }
  }
  return { start: fmtDate(periodStart), end: fmtDate(periodEnd) };
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function getCurrentPeriod(){return getPeriodForDate(todayStr());}

function getPeriodLabel(start, end){
  const s=new Date(start), e=new Date(end);
  return `${s.getMonth()+1}/${s.getDate()} 〜 ${e.getMonth()+1}/${e.getDate()}`;
}

function groupByPeriod(recs){
  const groups=[];
  const seen=new Set();
  recs.forEach(r=>{
    const {start,end}=getPeriodForDate(r.date);
    const key=start+'_'+end;
    if(!seen.has(key)){seen.add(key);groups.push({start,end,records:[]});}
    const g=groups.find(g=>g.start===start&&g.end===end);
    g.records.push(r);
  });
  return groups;
}

/* ══ Auth ══ */
async function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  const pin=pins.login||'';
  const err=document.getElementById('login-err');
  if(!name){err.textContent='ユーザー名を入力してください';pins.login='';updDots('login');return;}
  if(pin.length<4)return;
  showLoading('ログイン中...');
  try{
    const user=await dbGetUser(name);
    if(!user){err.textContent='ユーザーが見つかりません';pins.login='';updDots('login');hideLoading();return;}
    if(user.pin_hash!==hashPin(pin)){err.textContent='PINが違います';pins.login='';updDots('login');hideLoading();return;}
    err.textContent='';pins.login='';updDots('login');
    CU=name;await initMain();ss('main');
  }catch(e){err.textContent='通信エラー: '+e.message;pins.login='';updDots('login');}
  hideLoading();
}
async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const pin=pins.reg||'';
  const err=document.getElementById('reg-err');
  if(!name){err.textContent='名前を入力してください';pins.reg='';updDots('reg');return;}
  if(pin.length<4)return;
  showLoading('登録中...');
  try{
    const ex=await dbGetUser(name);
    if(ex){err.textContent='この名前はすでに使われています';pins.reg='';updDots('reg');hideLoading();return;}
    await dbCreateUser(name,hashPin(pin));
    await dbSaveCats(name,DEFAULTS);
    err.textContent='';pins.reg='';updDots('reg');
    document.getElementById('reg-name').value='';
    CU=name;await initMain();ss('main');
  }catch(e){err.textContent='通信エラー: '+e.message;pins.reg='';updDots('reg');}
  hideLoading();
}
function doLogout(){CU=null;cats=[];records=[];closingDay=0;pins.login='';updDots('login');document.getElementById('login-name').value='';document.getElementById('login-err').textContent='';ss('login');}

/* ══ Period Banner ══ */
function renderPeriodBanner(){
  const {start,end}=getCurrentPeriod();
  const periodRecs=records.filter(r=>r.date>=start&&r.date<=end);
  let totalYen=0,totalCount=0;
  periodRecs.forEach(r=>{totalYen+=recYen(r);totalCount+=recTotal(r);});
  const el=document.getElementById('period-banner');
  if(!el)return;
  const label=getPeriodLabel(start,end);
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <div>
        <p style="font-size:12px;color:var(--green-dark);margin:0 0 2px;font-weight:500;">📋 今締め期間（${label}）</p>
        <p style="font-size:13px;color:var(--green-dark);margin:0;">${periodRecs.length}日稼働・合計 ${totalCount.toLocaleString()} 個</p>
      </div>
      <p style="font-size:22px;font-weight:600;color:var(--green-dark);margin:0;">${totalYen.toLocaleString()} 円</p>
    </div>`;
}

function tagCls(id){return{normal:'n',cool:'c',collect:'col'}[id]||'custom';}
function getVal(id){const el=document.getElementById('cnt-'+id);return el?Math.max(0,parseInt(el.value)||0):0;}
function change(id,d){const el=document.getElementById('cnt-'+id);if(!el)return;el.value=Math.max(0,(parseInt(el.value)||0)+d);updateSummary();}
function updateSummary(){
  let total=0,yen=0,types=0;

  document.getElementById('type-count').textContent=types+' 種';

/* ══ Save ══ */
async function saveRecord(){
  const date=document.getElementById('record-date').value;
  if(!date){showToast('日付を選択してください');return;}
  let totalCount=0;const counts={};
  cats.forEach(cat=>{const v=getVal(cat.id);counts[cat.id]=v;totalCount+=v;});
  if(totalCount===0){showToast('個数を入力してください');return;}
  const memo=document.getElementById('memo').value.trim();
  const saved=Date.now();
  const existing=records.find(r=>r.date===date);
  if(existing&&!confirm('この日の記録を上書きしますか？'))return;
  showLoading('保存中...');
  try{
    if(existing){
      await dbUpdateRecord(CU,date,counts,memo,saved);
      const idx=records.findIndex(r=>r.date===date);
      records[idx]={...records[idx],counts,memo,saved};
    }else{
      await dbInsertRecord(CU,date,counts,memo,saved);
      records.push({username:CU,date,counts,memo,saved});
      records.sort((a,b)=>b.date.localeCompare(a.date));
    }
    renderHistory();renderCalendar();renderPeriodBanner();
    showToast('記録を保存しました');
  }catch(e){showToast('保存エラー: '+e.message);}
  hideLoading();
}

/* ══ Helpers ══ */
function recYen(r){let y=0;cats.forEach(cat=>y+=((r.counts||{})[cat.id]||0)*cat.price);return y;}
function recTotal(r){let t=0;cats.forEach(cat=>t+=((r.counts||{})[cat.id]||0));return t;}

/* ══ History（締め期間グループ表示） ══ */
function renderHistory(){
  const el=document.getElementById('history-list');
  if(!records.length){el.innerHTML='<p style="font-size:14px;color:var(--text3);text-align:center;padding:2rem 0;">まだ記録がありません</p>';return;}
  const groups=groupByPeriod(records);
  let html='';
  groups.forEach(g=>{
    let pYen=0,pCount=0;
    g.records.forEach(r=>{pYen+=recYen(r);pCount+=recTotal(r);});
    html+=`<div class="period-header">
      <div>
        <p class="ph-title">📋 ${getPeriodLabel(g.start,g.end)}</p>
        <p class="ph-summary">${g.records.length}日稼働・${pCount.toLocaleString()}個</p>
      </div>
      <p class="ph-total">${pYen.toLocaleString()} 円</p>
    </div>`;
    g.records.forEach(r=>{
      const tags=cats.map(cat=>{const n=(r.counts||{})[cat.id]||0;return n>0?`<span class="tag ${tagCls(cat.id)}">${cat.name} ${n}個</span>`:''}).join('');
      html+=`<div class="record-row">
        <span style="font-weight:500;min-width:90px;">${r.date}</span>
        <span style="font-size:12px;color:var(--text3);min-width:34px;">${recTotal(r)}個</span>
        <div style="display:flex;gap:4px;flex:1;flex-wrap:wrap;">${tags}</div>
        ${r.memo?`<span style="font-size:11px;color:var(--text2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.memo}">${r.memo}</span>`:''}
        <span style="font-weight:500;min-width:68px;text-align:right;color:var(--blue);">${recYen(r).toLocaleString()}円</span>
        <button class="btn-sm" style="padding:3px 8px;font-size:12px;" onclick="deleteRecord('${r.date}')">削除</button>
      </div>`;
    });
  });
  el.innerHTML=html;
}

async function deleteRecord(date){
  if(!confirm('この記録を削除しますか？'))return;
  showLoading('削除中...');
  try{await dbDeleteRecord(CU,date);records=records.filter(r=>r.date!==date);renderHistory();renderCalendar();renderPeriodBanner();showToast('削除しました');}
  catch(e){showToast('削除エラー: '+e.message);}
  hideLoading();
}

/* ══ CSV ══ */
function exportCSV(){
  if(!records.length){showToast('記録がありません');return;}
  const header=['締め期間','日付',...cats.map(c=>c.name+'(個)'),'合計個数','日額(円)','メモ'].join(',');
  const rows=records.map(r=>{
    const {start,end}=getPeriodForDate(r.date);
    let yen=0,total=0;
    const cols=cats.map(cat=>{const n=(r.counts||{})[cat.id]||0;yen+=n*cat.price;total+=n;return n;});
    return[`"${getPeriodLabel(start,end)}"`,r.date,...cols,total,yen,`"${r.memo||''}"`].join(',');
  });
  const blob=new Blob(['\uFEFF'+header+'\n'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=CU+'_配送記録.csv';a.click();URL.revokeObjectURL(url);
}

/* ══ Calendar ══ */
function calMove(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function renderCalendar(){
  const title=document.getElementById('cal-title');if(!title)return;
  title.textContent=calYear+'年'+(calMonth+1)+'月';
  const recMap={};records.forEach(r=>recMap[r.date]=r);
  const today=todayStr();
  // 締め日
  const cdActual = closingDay===0 ? new Date(calYear,calMonth+1,0).getDate() : Math.min(closingDay, new Date(calYear,calMonth+1,0).getDate());
  const closingDateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(cdActual).padStart(2,'0')}`;

  const startDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const rows=Math.ceil((startDow+daysInMonth)/7);
  let cells='';
  for(let i=0;i<rows*7;i++){
    let day,dateStr,isOther=false;
    if(i<startDow){day=daysInPrev-(startDow-1-i);dateStr=new Date(calYear,calMonth-1,day).toISOString().slice(0,10);isOther=true;}
    else if(i>=startDow+daysInMonth){day=i-startDow-daysInMonth+1;dateStr=new Date(calYear,calMonth+1,day).toISOString().slice(0,10);isOther=true;}
    else{day=i-startDow+1;dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;}
    const rec=recMap[dateStr];const isToday=dateStr===today;const hasData=!!rec&&!isOther;
    const isClosing=dateStr===closingDateStr&&!isOther;
    const dow=i%7;const nc=dow===0?'color:var(--red)':dow===6?'color:var(--blue)':'';
    cells+=`<div class="cal-day${isOther?' other-month':''}${isToday?' today':''}${hasData?' has-data':''}${isClosing?' closing-day':''}" onclick="calClick('${dateStr}')">
      <div class="cal-num" style="${nc}">${day}${isClosing?'<span style="font-size:9px;color:var(--red);display:block;line-height:1;">締</span>':''}</div>
      ${hasData?`<div class="cal-yen">${recYen(rec).toLocaleString()}円</div><div class="cal-cnt">${recTotal(rec)}個</div>`:''}
    </div>`;
  }
  document.getElementById('cal-body').innerHTML=cells;
  document.getElementById('cal-detail').innerHTML='';
}
function calClick(dateStr){
  const rec=records.find(r=>r.date===dateStr);
  const el=document.getElementById('cal-detail');
  if(!rec){el.innerHTML=`<div class="card"><p style="font-size:13px;color:var(--text2);margin:0 0 8px;">${dateStr} — 記録なし</p><button class="btn-sm" onclick="jumpToInput('${dateStr}')">この日の記録を入力</button></div>`;return;}
  const tags=cats.map(cat=>{const n=(rec.counts||{})[cat.id]||0;return n>0?`<span class="tag ${tagCls(cat.id)}">${cat.name} ${n}個</span>`:''}).join('');
  const {start,end}=getPeriodForDate(dateStr);
  el.innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-size:14px;font-weight:500;">${dateStr}</span><span style="font-size:15px;font-weight:500;color:var(--blue);">${recYen(rec).toLocaleString()}円</span></div><p style="font-size:11px;color:var(--text3);margin:0 0 8px;">締め期間: ${getPeriodLabel(start,end)}</p><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;">${tags}</div>${rec.memo?`<p style="font-size:13px;color:var(--text2);margin:0 0 8px;">${rec.memo}</p>`:''}<button class="btn-sm" onclick="jumpToInput('${dateStr}')">編集</button></div>`;
}
function jumpToInput(dateStr){
  const rec=records.find(r=>r.date===dateStr);
  document.getElementById('record-date').value=dateStr;
  if(rec){cats.forEach(cat=>{const el=document.getElementById('cnt-'+cat.id);if(el)el.value=(rec.counts||{})[cat.id]||0;});document.getElementById('memo').value=rec.memo||'';updateSummary();}
  else{clearForm();document.getElementById('record-date').value=dateStr;}
  switchTab('input');
}

async function addCategory(){
  const name=document.getElementById('new-cat-name').value.trim();
  const price=parseInt(document.getElementById('new-cat-price').value);
  const err=document.getElementById('cat-err');
  if(!name){err.textContent='種別名を入力してください';return;}
  if(!price||price<=0){err.textContent='単価を正しく入力してください';return;}
  if(cats.find(c=>c.name===name)){err.textContent='この種別名はすでに存在します';return;}
  cats.push({id:'cat_'+Date.now(),name,price,fixed:false});
  showLoading('保存中...');
  try{await dbSaveCats(CU,cats);renderCatList();renderItemsGrid();updateSummary();document.getElementById('new-cat-name').value='';document.getElementById('new-cat-price').value='';err.textContent='';showToast('種別を追加しました');}
  catch(e){cats.pop();err.textContent='保存エラー: '+e.message;}
  hideLoading();
}
async function removeCategory(i){
  if(!confirm('この種別を削除しますか？'))return;
  const removed=cats.splice(i,1);
  showLoading('削除中...');
  try{await dbSaveCats(CU,cats);renderCatList();renderItemsGrid();updateSummary();showToast('削除しました');}
  catch(e){cats.splice(i,0,...removed);showToast('削除エラー: '+e.message);}
  hideLoading();
}
async function changePin(){
  const curPin=pins.cur||'',newPin=pins.new||'';
  const err=document.getElementById('pw-err');
  if(curPin.length<4||newPin.length<4)return;
  showLoading('変更中...');
  try{
    const user=await dbGetUser(CU);
    if(user.pin_hash!==hashPin(curPin)){err.textContent='現在のPINが違います';pins.cur='';pins.new='';updDots('cur');updDots('new');hideLoading();return;}
    await dbUpdatePin(CU,hashPin(newPin));
    pins.cur='';pins.new='';updDots('cur');updDots('new');err.textContent='';showToast('PINを変更しました');
  }catch(e){err.textContent='エラー: '+e.message;}
  hideLoading();
}
async function deleteAccount(){
  if(!confirm('本当にアカウントを削除しますか？\nすべての記録が消えます。'))return;
  showLoading('削除中...');
  try{
    await dbDeleteUser(CU);
    await sb(`delivery_records?username=eq.${enc(CU)}`,'DELETE');
    await sb(`categories?username=eq.${enc(CU)}`,'DELETE');
    localStorage.removeItem('closing_'+CU);
    CU=null;ss('login');
  }catch(e){showToast('削除エラー: '+e.message);}
  hideLoading();
}

/* ══ Toast ══ */
let toastTimer=null;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);}

ss('login');
</script>
